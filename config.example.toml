[strava]
# Copy this file to config.toml and replace the placeholder values.
# Never commit config.toml; it contains OAuth credentials and refreshed tokens.
client_id = ""
client_secret = ""
refresh_token = ""

# Optional fallback for one-off runs when refresh_token is not configured.
access_token = ""
expires_at = 0

[sync]
# Number of recent days to fetch from Strava.
days = 7

# Maximum number of activities to request per sync run.
per_page = 10
